<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Entregador - PedidoFácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e67e22, #d35400);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
        }

        .logo-area h1 {
            font-size: 28px;
            margin-top: 10px;
            color: #1a1a2e;
        }

        .logo-area p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
        }

        .btn-login {
            background: #e67e22;
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            background: #d35400;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .register-link a {
            color: #e67e22;
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 20px;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancelar {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #ccc;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <div class="logo-icon">🛵</div>
                <h1>PedidoFácil</h1>
                <p>App do Entregador</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-login">Entrar →</button>
            </form>
            
            <div class="register-link">
                Não tem conta? <a href="#" id="btnCadastro">Cadastre-se</a>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div id="modalCadastro" class="modal">
        <div class="modal-content">
            <h3>📝 Cadastro de Entregador</h3>
            <input type="text" id="cadastroNome" placeholder="Nome completo">
            <input type="email" id="cadastroEmail" placeholder="Email">
            <input type="tel" id="cadastroTelefone" placeholder="WhatsApp">
            <input type="text" id="cadastroVeiculo" placeholder="Veículo (Moto/Bike/Carro)">
            <input type="text" id="cadastroPlaca" placeholder="Placa (se moto/carro)">
            <input type="password" id="cadastroSenha" placeholder="Senha (mínimo 6 caracteres)">
            <button id="btnCadastrar" class="btn-cadastrar">Cadastrar</button>
            <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4",
            authDomain: "lanchepodpah.firebaseapp.com",
            projectId: "lanchepodpah",
            storageBucket: "lanchepodpah.firebasestorage.app",
            messagingSenderId: "451860544292",
            appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('message');
            msg.textContent = texto;
            msg.style.backgroundColor = tipo === 'success' ? '#27ae60' : '#e74c3c';
            msg.style.color = 'white';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const entregadorRef = doc(db, "entregadores", email);
            const docSnap = await getDoc(entregadorRef);
            
            if (docSnap.exists() && docSnap.data().senha === btoa(senha)) {
                localStorage.setItem('entregadorLogado', JSON.stringify({ 
                    email: email, 
                    nome: docSnap.data().nome,
                    veiculo: docSnap.data().veiculo
                }));
                window.location.href = 'dashboard.html';
            } else {
                mostrarMensagem('Email ou senha incorretos', 'error');
            }
        });
        
        // Abrir modal
        document.getElementById('btnCadastro').addEventListener('click', () => {
            document.getElementById('modalCadastro').style.display = 'flex';
        });
        
        // Cadastrar
        document.getElementById('btnCadastrar').addEventListener('click', async () => {
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const telefone = document.getElementById('cadastroTelefone').value;
            const veiculo = document.getElementById('cadastroVeiculo').value;
            const placa = document.getElementById('cadastroPlaca').value;
            const senha = document.getElementById('cadastroSenha').value;
            
            if (!nome || !email || !telefone || !senha) {
                mostrarMensagem('Preencha todos os campos obrigatórios', 'error');
                return;
            }
            
            if (senha.length < 6) {
                mostrarMensagem('Senha precisa ter no mínimo 6 caracteres', 'error');
                return;
            }
            
            const entregadorRef = doc(db, "entregadores", email);
            const docSnap = await getDoc(entregadorRef);
            
            if (docSnap.exists()) {
                mostrarMensagem('Email já cadastrado!', 'error');
                return;
            }
            
            await setDoc(entregadorRef, {
                nome, email, telefone, veiculo, placa,
                senha: btoa(senha),
                status: "offline",
                saldo: 0,
                createdAt: new Date().toISOString()
            });
            
            mostrarMensagem('✅ Cadastro realizado! Faça login.', 'success');
            fecharModal();
        });
        
        window.fecharModal = () => {
            document.getElementById('modalCadastro').style.display = 'none';
        };
        
        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
